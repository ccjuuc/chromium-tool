<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图像转换服务 - Chromium Tool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 50px rgba(0,0,0,0.15);
        }

        .card-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #667eea;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: #667eea;
            border-radius: 2px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            color: #555;
            font-size: 0.95rem;
        }

        .form-group input[type="file"],
        .form-group input[type="text"],
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
            background: #fafafa;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
            background: white;
        }

        .form-group input[type="file"] {
            padding: 10px;
            cursor: pointer;
        }

        .btn {
            width: 100%;
            padding: 14px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 16px 24px;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            display: none;
            z-index: 1000;
            min-width: 300px;
            text-align: center;
            font-weight: 500;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        .toast.success {
            background: #10b981;
            color: white;
        }

        .toast.error {
            background: #ef4444;
            color: white;
        }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .preview-row {
            display: flex;
            gap: 20px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .preview-col {
            flex: 1;
            min-width: 120px;
        }

        .preview-label {
            font-size: 0.85rem;
            font-weight: 500;
            color: #555;
            margin-bottom: 8px;
        }

        .preview-thumb-btn {
            width: 100%;
            max-width: 120px;
            height: 96px;
            padding: 4px;
            border: 2px solid #e8e8f0;
            border-radius: 10px;
            background: #fafafa;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .preview-thumb-btn:hover:not(:disabled) {
            border-color: #667eea;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }

        .preview-thumb-btn:disabled {
            cursor: default;
            opacity: 0.55;
        }

        .preview-thumb-btn img {
            max-width: 100%;
            max-height: 88px;
            object-fit: contain;
            vertical-align: middle;
        }

        .preview-out-placeholder {
            font-size: 0.8rem;
            color: #888;
            text-align: center;
            padding: 8px;
            line-height: 1.35;
        }

        .lightbox {
            position: fixed;
            inset: 0;
            z-index: 2000;
        }

        .lightbox-backdrop {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.72);
            cursor: pointer;
        }

        .lightbox-inner {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
            max-width: min(96vw, 1600px);
            max-height: 92vh;
            overflow: auto;
            background: #111;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
        }

        .lightbox-inner img {
            display: block;
            max-width: 100%;
            max-height: 88vh;
            width: auto;
            height: auto;
            margin: 0 auto;
        }

        .lightbox-inner pre {
            margin: 0;
            padding: 20px;
            max-width: min(90vw, 960px);
            max-height: 85vh;
            overflow: auto;
            font-size: 13px;
            line-height: 1.45;
            color: #e4e4e7;
            background: #18181b;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .lightbox-close {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 2;
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
            font-size: 26px;
            line-height: 1;
            cursor: pointer;
            transition: background 0.2s;
        }

        .lightbox-close:hover {
            background: rgba(255, 255, 255, 0.22);
        }

        @media (max-width: 768px) {
            .cards {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛠️ Chromium 工具集</h1>
            <p>图像转换与 OEM 等工具</p>
        </div>

        <div class="cards">
            <div class="card">
                <div class="card-title">格式转换</div>
                <form id="convertImageForm">
                    <div class="form-group">
                        <label for="logo_path">原图文件 (SVG / PNG / Chromium .icon)</label>
                        <input type="file" id="logo_path" name="logo_path" accept=".png,.svg,.jpg,.jpeg,.icon" required>
                    </div>
                    <div class="form-group">
                        <label for="convert_output_suffix">输出后缀</label>
                        <select id="convert_output_suffix" name="output_suffix" required>
                            <option value=".icon">.icon</option>
                            <option value=".ico">.ico</option>
                            <option value=".icns">.icns</option>
                            <option value=".png">.png</option>
                            <option value=".svg">.svg</option>
                        </select>
                    </div>
                    <div class="preview-row" id="convert_preview_row" hidden>
                        <div class="preview-col">
                            <div class="preview-label">原图</div>
                            <button type="button" class="preview-thumb-btn" id="convert_src_thumb_btn" disabled aria-label="查看原图大图">
                                <img id="convert_src_thumb" alt="" />
                            </button>
                        </div>
                        <div class="preview-col">
                            <div class="preview-label">转换后</div>
                            <button type="button" class="preview-thumb-btn" id="convert_out_thumb_btn" disabled aria-label="查看转换结果大图">
                                <img id="convert_out_thumb" alt="" hidden />
                                <span id="convert_out_thumb_placeholder" class="preview-out-placeholder">完成转换后显示预览</span>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="btn" id="convertBtn">开始转换</button>
                </form>
            </div>

            <div class="card">
                <div class="card-title">OEM 转换</div>
                <form id="oemConvertForm">
                    <div class="form-group">
                        <label for="oem_logo_path">原图文件 (PNG/SVG)</label>
                        <input type="file" id="oem_logo_path" name="logo_path" accept=".png,.svg,.jpg,.jpeg" required>
                    </div>
                    <div class="form-group">
                        <label for="document_path">MAC 文档图 (可选)</label>
                        <input type="file" id="document_path" name="document_path" accept=".png,.jpg,.jpeg">
                    </div>
                    <button type="submit" class="btn" id="oemBtn">开始转换</button>
                </form>
            </div>

            <div class="card">
                <div class="card-title">添加圆角</div>
                <form id="addRoundedCornersForm">
                    <div class="form-group">
                        <label for="corner_logo_path">原图文件 (PNG)</label>
                        <input type="file" id="corner_logo_path" name="logo_path" accept=".png,.jpg,.jpeg" required>
                    </div>
                    <div class="form-group">
                        <label for="radius">圆角大小</label>
                        <input type="text" id="radius" name="radius" 
                               placeholder="例如: 10 或 10,20,30,40" required>
                    </div>
                    <button type="submit" class="btn" id="cornerBtn">添加圆角</button>
                </form>
            </div>
        </div>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <div id="lightbox" class="lightbox" hidden role="dialog" aria-modal="true" aria-label="大图预览">
        <div class="lightbox-backdrop" id="lightbox_backdrop"></div>
        <button type="button" class="lightbox-close" id="lightbox_close" aria-label="关闭">×</button>
        <div class="lightbox-inner">
            <img id="lightbox_img" alt="" />
            <pre id="lightbox_pre" hidden></pre>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin;

        // 工具函数
        async function getBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = error => reject(error);
            });
        }

        function showMessage(message, isSuccess) {
            const messageDiv = document.getElementById('toast');
            messageDiv.textContent = message;
            messageDiv.className = `toast ${isSuccess ? 'success' : 'error'}`;
            messageDiv.style.display = 'block';
            
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }

        function setLoading(buttonId, isLoading) {
            const btn = document.getElementById(buttonId);
            if (isLoading) {
                btn.disabled = true;
                btn.innerHTML = '<span class="loading"></span>处理中...';
            } else {
                btn.disabled = false;
                btn.innerHTML = btn.getAttribute('data-original-text') || btn.textContent;
            }
        }

        async function handleFormSubmit(formId, endpoint, payloadBuilder, buttonId) {
            const form = document.getElementById(formId);
            const btn = document.getElementById(buttonId);
            btn.setAttribute('data-original-text', btn.textContent);
            
            form.addEventListener('submit', async function(event) {
                event.preventDefault();
                setLoading(buttonId, true);
                
                try {
                    const formData = new FormData(event.target);
                    const payload = await payloadBuilder(formData);
                    
                    const response = await fetch(`${API_BASE}${endpoint}`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(payload)
                    });

                    const responseData = await response.text();
                    if (response.ok) {
                        showMessage(responseData || '操作成功', true);
                    } else {
                        showMessage(responseData || '操作失败', false);
                    }
                } catch (error) {
                    showMessage(`错误: ${error.message}`, false);
                } finally {
                    setLoading(buttonId, false);
                }
            });
        }

        function convertStemFromFileName(name) {
            const i = name.lastIndexOf('.');
            if (i <= 0) return name;
            return name.slice(0, i);
        }

        /** 源文件扩展名（小写，含点） */
        function fileExtensionLower(name) {
            const i = name.lastIndexOf('.');
            if (i < 0) return '';
            return name.slice(i).toLowerCase();
        }

        /**
         * 与源同后缀的项置灰；.png / .icon 仅 SVG 源；.svg 仅 Chromium .icon 源；
         * .icon 源仅允许导出 .svg。
         */
        function updateConvertSuffixOptions() {
            const fileInput = document.getElementById('logo_path');
            const select = document.getElementById('convert_output_suffix');
            if (!fileInput || !select) return;
            const file = fileInput.files && fileInput.files[0];
            const srcExt = file ? fileExtensionLower(file.name) : '';

            let firstEnabledIndex = -1;
            Array.from(select.options).forEach((opt, idx) => {
                const out = opt.value.toLowerCase();
                let dis = false;
                if (file && out === srcExt) dis = true;
                if (file && (out === '.png' || out === '.icon') && srcExt !== '.svg') dis = true;
                if (file && out === '.svg' && srcExt !== '.icon') dis = true;
                if (file && srcExt === '.icon' && out !== '.svg') dis = true;
                opt.disabled = dis;
                if (!dis && firstEnabledIndex < 0) firstEnabledIndex = idx;
            });

            const cur = select.options[select.selectedIndex];
            if (file && cur && cur.disabled && firstEnabledIndex >= 0) {
                select.selectedIndex = firstEnabledIndex;
            }
        }

        let convertSrcObjectUrl = null;
        let convertOutPreviewUrl = null;

        function revokeConvertSrcObjectUrl() {
            if (convertSrcObjectUrl) {
                URL.revokeObjectURL(convertSrcObjectUrl);
                convertSrcObjectUrl = null;
            }
        }

        function resetConvertOutputPreview() {
            convertOutPreviewUrl = null;
            const outImg = document.getElementById('convert_out_thumb');
            const outBtn = document.getElementById('convert_out_thumb_btn');
            const ph = document.getElementById('convert_out_thumb_placeholder');
            outImg.removeAttribute('src');
            outImg.hidden = true;
            ph.hidden = false;
            ph.textContent = '完成转换后显示预览';
            outBtn.disabled = true;
        }

        function refreshConvertSourcePreview() {
            const fileInput = document.getElementById('logo_path');
            const row = document.getElementById('convert_preview_row');
            const thumb = document.getElementById('convert_src_thumb');
            const srcBtn = document.getElementById('convert_src_thumb_btn');
            revokeConvertSrcObjectUrl();
            resetConvertOutputPreview();
            if (!fileInput.files || !fileInput.files[0]) {
                row.hidden = true;
                thumb.removeAttribute('src');
                srcBtn.disabled = true;
                return;
            }
            row.hidden = false;
            const file = fileInput.files[0];
            convertSrcObjectUrl = URL.createObjectURL(file);
            thumb.src = convertSrcObjectUrl;
            srcBtn.disabled = false;
        }

        function closeLightbox() {
            const lb = document.getElementById('lightbox');
            const img = document.getElementById('lightbox_img');
            const pre = document.getElementById('lightbox_pre');
            lb.hidden = true;
            img.removeAttribute('src');
            img.hidden = false;
            pre.textContent = '';
            pre.hidden = true;
        }

        function openLightboxImage(url) {
            if (!url) return;
            const img = document.getElementById('lightbox_img');
            const pre = document.getElementById('lightbox_pre');
            pre.hidden = true;
            pre.textContent = '';
            img.hidden = false;
            img.src = url;
            document.getElementById('lightbox').hidden = false;
        }

        document.getElementById('lightbox_backdrop').addEventListener('click', closeLightbox);
        document.getElementById('lightbox_close').addEventListener('click', closeLightbox);
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape' && !document.getElementById('lightbox').hidden) {
                closeLightbox();
            }
        });

        document.getElementById('convert_src_thumb_btn').addEventListener('click', function () {
            if (convertSrcObjectUrl) openLightboxImage(convertSrcObjectUrl);
        });

        document.getElementById('convert_out_thumb_btn').addEventListener('click', function () {
            if (convertOutPreviewUrl) openLightboxImage(convertOutPreviewUrl);
        });

        document.getElementById('logo_path').addEventListener('change', function () {
            updateConvertSuffixOptions();
            refreshConvertSourcePreview();
        });
        updateConvertSuffixOptions();
        refreshConvertSourcePreview();

        (function setupConvertImageForm() {
            const form = document.getElementById('convertImageForm');
            const btn = document.getElementById('convertBtn');
            btn.setAttribute('data-original-text', btn.textContent);

            form.addEventListener('submit', async function (event) {
                event.preventDefault();
                setLoading('convertBtn', true);
                try {
                    const formData = new FormData(event.target);
                    const file = formData.get('logo_path');
                    if (!file || !file.size) {
                        throw new Error('请选择源文件');
                    }
                    const extWithDot = formData.get('output_suffix');
                    if (!extWithDot || !extWithDot.startsWith('.')) {
                        throw new Error('请选择输出后缀');
                    }
                    const stem = convertStemFromFileName(file.name);
                    const output_path = stem + extWithDot;
                    const format = extWithDot.slice(1).toUpperCase();

                    const payload = {
                        logo_name: file.name,
                        logo_data: await getBase64(file),
                        output_path,
                        format
                    };

                    const response = await fetch(`${API_BASE}/convert_image`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    const raw = await response.text();
                    if (!response.ok) {
                        showMessage(raw || '操作失败', false);
                        return;
                    }

                    let message = raw;
                    try {
                        const data = JSON.parse(raw);
                        if (data && typeof data.message === 'string') {
                            message = data.message;
                        }
                        if (data && data.preview_name) {
                            const name = data.preview_name;
                            const bust = '?t=' + Date.now();
                            const lower = name.toLowerCase();
                            const isIcon = lower.endsWith('.icon');
                            const isSvg = lower.endsWith('.svg');
                            // .icon 为纯文本，浏览器 <img> 无法解码；用服务端转成的 SVG 供图片标签预览。
                            convertOutPreviewUrl = isIcon
                                ? `${API_BASE}/convert_output_svg/${encodeURIComponent(name)}${bust}`
                                : `${API_BASE}/convert_output/${encodeURIComponent(name)}${bust}`;
                            const outImg = document.getElementById('convert_out_thumb');
                            const outBtn = document.getElementById('convert_out_thumb_btn');
                            const ph = document.getElementById('convert_out_thumb_placeholder');
                            ph.hidden = true;
                            outImg.hidden = false;
                            outImg.onerror = function () {
                                outImg.hidden = true;
                                ph.hidden = false;
                                ph.textContent = isIcon
                                    ? 'SVG 预览生成失败（可检查 .icon 内容）'
                                    : isSvg
                                        ? 'SVG 预览加载失败'
                                        : '此格式无法在浏览器中预览';
                                outBtn.disabled = false;
                            };
                            outImg.onload = function () {
                                outImg.onerror = null;
                                outBtn.disabled = false;
                            };
                            outImg.src = convertOutPreviewUrl;
                        }
                    } catch (_) {
                        /* 兼容非 JSON 响应 */
                    }
                    showMessage(message || '操作成功', true);
                } catch (error) {
                    showMessage('错误: ' + error.message, false);
                } finally {
                    setLoading('convertBtn', false);
                }
            });
        })();

        // OEM 转换
        handleFormSubmit('oemConvertForm', '/oem_convert', async (formData) => {
            const file = formData.get('logo_path');
            const document_file = formData.get('document_path');
            
            const payload = {
                logo_name: file.name,
                logo_data: await getBase64(file),
                document_name: "",
                document_data: ""
            };

            if (document_file && document_file.size > 0) {
                payload.document_name = document_file.name;
                payload.document_data = await getBase64(document_file);
            }

            return payload;
        }, 'oemBtn');

        // 添加圆角
        handleFormSubmit('addRoundedCornersForm', '/add_rounded_corners', async (formData) => {
            const file = formData.get('logo_path');
            return {
                logo_name: file.name,
                logo_data: await getBase64(file),
                radius: formData.get('radius')
            };
        }, 'cornerBtn');
    </script>
</body>
</html>
